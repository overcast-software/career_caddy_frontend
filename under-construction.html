<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Caddy — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 1rem;
    }

    .logo span {
      color: #6366f1;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.4rem 1rem;
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Career<span>Caddy</span></div>
    <h1>We're working on something great.</h1>
    <div class="badge">Under Construction</div>
  </div>
</body>
</html>
