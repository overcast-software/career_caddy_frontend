server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
        # A location that sets its own add_header stops inheriting server-level
        # add_headers, so re-include the env-gated noindex header here. Empty
        # (no-op) unless ROBOTS_NOINDEX=true. See docker-entrypoint.d/20-robots-noindex.sh.
        include /etc/nginx/robots-noindex-header.d/*.conf;
    }

    # Env-gated same-origin reverse proxy. Empty by default (no-op) → the
    # frontend is SPA-only and /api|/mcp fall through to the SPA fallback
    # below; that's the omarchy/prod path where an outer Caddy peels /api|/mcp
    # off in front of this container. When API_UPSTREAM is set (GCP dev env,
    # no outer proxy), docker-entrypoint.d/10-api-proxy.sh emits the proxy
    # location blocks here at container start:
    #   location /api/v1/events → $EVENTS_UPSTREAM (SSE)
    #   location /api/          → $API_UPSTREAM
    #   location /mcp/          → $MCP_UPSTREAM
    # Placed before `location /` so the proxied prefixes win over the SPA
    # fallback. include of an empty dir is a no-op. Prefix-location matching
    # is longest-match regardless of file order, but keep this above the
    # fallback for clarity. See docker-entrypoint.d/10-api-proxy.sh.
    include /etc/nginx/api-proxy.d/*.conf;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-include noindex header (this location sets its own add_header).
        include /etc/nginx/robots-noindex-header.d/*.conf;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Env-gated search-indexing block. Empty by default (no-op, prod stays
    # indexable). When ROBOTS_NOINDEX=true, docker-entrypoint.d/20-robots-noindex.sh
    # fills these include dirs at container start:
    #   robots-noindex-header.d → the X-Robots-Tag "noindex, nofollow" header,
    #     re-included into every location that overrides add_header (above) and
    #     inherited by locations that don't (e.g. `location /`).
    #   robots-noindex.d → the `location = /robots.txt` disallow-all block.
    # include of an empty dir is a no-op.
    include /etc/nginx/robots-noindex-header.d/*.conf;
    include /etc/nginx/robots-noindex.d/*.conf;
}
