name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  # On main we let older runs finish — when two PRs merge in close
  # succession, the first merge's CI would otherwise be cancelled by
  # the second, and "cancelled" emails show up looking like failures
  # even though nothing's wrong. On feature branches and PRs, cancel
  # older in-flight runs to save compute when the user pushes fixups.
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test:ember
